# synthetic-data.yml
# Equivalent of the <syntheticFileList> and <syntheticTemplates> blocks in
# PhantomFS.exe.config, expressed as YAML.
#
# Load with:
#   PhantomFS.exe --virtroot C:\Honeypot --syntheticonly --syntheticyaml C:\Honeypot\synthetic-data.yml
# or embed the path once in PhantomFS.exe.config:
#   <settings><syntheticYamlPath>C:\Honeypot\synthetic-data.yml</syntheticYamlPath></settings>
#
# When --syntheticyaml (or <syntheticYamlPath>) is set, this file replaces
# <syntheticFileList> AND <syntheticTemplates> together. PhantomFS.exe.config
# is still used for everything under <settings> (alerts, cleanup, verbose, etc).
#
# Schema
#   files:
#     - path:      Virtual path, "/" or "\" both accepted as the separator.
#       directory: true | false            (default: false)
#       size:      bytes                   (default: 0; ignored for directories)
#       timestamp: unix seconds, applied to all four NTFS timestamps (default: 0)
#
#   templates:

#     - name:      OR   extension:         (exactly one of the two)
#       type:      "pem" for a generated PEM block, "base64" for a plain
#                  base64-encoded binary, "base64gzip" for base64 of a
#                  gzip stream, or omit for plain text (default)
#       pemLabel:  label inside BEGIN/END markers (pem only, default "PRIVATE KEY")
#       content:   |                        literal block:
#                    - plain text for the default type
#                    - base64 text for type: base64 / base64gzip (embedded
#                      newlines are fine - they're ignored during decoding)
#                    - not required for type: pem
#
# "base64" / "base64gzip" let you embed a real binary file (an actual small
# PDF, image, xlsx/docx, etc.) instead of synthesized text. Decoding happens
# lazily on first read and is cached after that, so adding many embedded
# binaries does not slow down startup. IMPORTANT: the matching "files:"
# entry's "size:" must equal the exact decoded (post-gzip) byte length, or
# the content will be truncated/padded to fit and most binary formats will
# fail to open. A mismatch logs a one-time [WARN] on first read.
#         ... file content, padded/truncated to the entry's declared size ...
#
# Indentation must use spaces (no tabs). Lines starting with # and blank lines
# are ignored outside of "content: |" blocks, where every line is kept as-is.

